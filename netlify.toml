[build]
  command = "npm run build"
  publish = "dist"
  base = "client"

# Proxy /api requests to the backend to avoid index.html fallback
[[redirects]]
  from = "/api/*"
  to = "https://fit-tracker-9yghcey5s-anushadk13s-projects.vercel.app/api/:splat"
  status = 200

# SPA Fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://fit-tracker-9yghcey5s-anushadk13s-projects.vercel.app"
